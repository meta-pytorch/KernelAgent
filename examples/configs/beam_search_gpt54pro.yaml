strategy: beam_search
num_workers: 4
strategy_config:
  num_top_kernels: 2
  num_bottlenecks: 2
openai_model: gpt-5-4-pro
high_reasoning_effort: true

benchmark_warmup: 25
benchmark_repeat: 100
divergence_threshold: 50.0
target_platform: cuda
gpu_name: "NVIDIA H100 NVL 94GB"
